# nginx serves the compiled static assets directly and hands PHP requests to
# PHP-FPM. `__PORT__` is replaced with Render's $PORT by entrypoint.sh at boot.

server {
    listen __PORT__ default_server;
    listen [::]:__PORT__ default_server;

    server_name _;
    root /var/www/html/public;
    index index.php;

    charset utf-8;

    # nginx handles compression correctly (unlike PHP's zlib.output_compression),
    # so CSS/JS are served gzipped without corrupting the response.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain text/css application/javascript application/json
        image/svg+xml application/xml font/woff font/woff2;

    client_max_body_size 32M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Long-cache the hashed Vite assets — the hash changes on every rebuild.
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Never serve dotfiles (e.g. a stray .env) or VCS metadata.
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
