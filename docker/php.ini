; Production PHP settings for the container.

; IMPORTANT: keep this Off. When On, PHP's output compression corrupts static
; responses served through the dev server; nginx does compression here instead.
zlib.output_compression = Off

memory_limit = 512M
max_execution_time = 120
upload_max_filesize = 32M
post_max_size = 40M

expose_php = Off
date.timezone = Asia/Colombo

; Opcache — compiled once, reused across requests.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.interned_strings_buffer = 16
